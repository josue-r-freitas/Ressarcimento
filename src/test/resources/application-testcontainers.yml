# Perfil para testes de integração com SQL Server via Testcontainers.
# A URL/usuário/senha do datasource são injetados pelo container via @ServiceConnection.
spring:
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    br.com.empresa.ressarcimento: INFO
