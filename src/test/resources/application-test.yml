spring:
  datasource:
    url: jdbc:h2:mem:ressarcimento;DB_CLOSE_DELAY=-1;MODE=MSSQLServer;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

# Desabilita Swagger nos testes para acelerar o contexto
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
