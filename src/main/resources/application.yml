# Variáveis: RESSARCIMENTO_DB_URL, RESSARCIMENTO_DB_USERNAME, RESSARCIMENTO_DB_PASSWORD
spring:
  datasource:
    url: ${RESSARCIMENTO_DB_URL:jdbc:sqlserver://localhost;databaseName=ressarcimento;encrypt=false;trustServerCertificate=true;loginTimeout=30}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${RESSARCIMENTO_DB_USERNAME:sa}
    password: ${RESSARCIMENTO_DB_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    br.com.empresa.ressarcimento: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{idProcessamento:-}] %logger{36} - %msg%n"

# Swagger/OpenAPI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# Pastas para geração automática da Planilha Produtos (resumonf + EFD + XML NF-e).
# Override por ambiente: RESSARCIMENTO_RESUMO_NOTAS_DIR, RESSARCIMENTO_EFDS_DIR, RESSARCIMENTO_NFES_DIR.
ressarcimento:
  resumo-notas-dir: ${RESSARCIMENTO_RESUMO_NOTAS_DIR:C:/Users/josue/OneDrive/Documentos/TrabalhosExtras/Ressarcimento/Processamento/Entrada/resumo-notas}
  efds-dir: ${RESSARCIMENTO_EFDS_DIR:C:/Users/josue/OneDrive/Documentos/TrabalhosExtras/Ressarcimento/Processamento/Entrada/efds}
  nfes-dir: ${RESSARCIMENTO_NFES_DIR:C:/Users/josue/OneDrive/Documentos/TrabalhosExtras/Ressarcimento/Processamento/Entrada/nfes-entrada}
  nfes-saida-dir: ${RESSARCIMENTO_NFES_SAIDA_DIR:C:/Users/josue/OneDrive/Documentos/TrabalhosExtras/Ressarcimento/Processamento/Entrada/nfes-saida}
