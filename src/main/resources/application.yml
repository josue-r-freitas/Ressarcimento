spring:
  datasource:
    url: jdbc:sqlserver://DESKTOP-P13INJM;instanceName=SQLEXPRESS;databaseName=ressarcimento;encrypt=false
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: app_elementar
    # Para outro ambiente, use variáveis: RESSARCIMENTO_DB_USERNAME e RESSARCIMENTO_DB_PASSWORD
    password: '!M19101993'
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    br.com.empresa.ressarcimento: INFO

# Swagger/OpenAPI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# Pastas para geração automática da Planilha Produtos (resumonf + EFD + XML NF-e)
ressarcimento:
  resumo-notas-dir: ${RESSARCIMENTO_RESUMO_NOTAS_DIR:}
  efds-dir: ${RESSARCIMENTO_EFDS_DIR:}
  nfes-dir: ${RESSARCIMENTO_NFES_DIR:}

