<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="h4 mb-3" th:text="${pageTitle}">Gerar XML</h1>
    <div th:if="${errorMessage}" class="alert alert-warning" th:text="${errorMessage}">Erro</div>
    <p class="text-muted">O XML é montado a partir das <strong>operações já importadas no banco</strong> (NF-e de saída e itens). Antes, use <a th:href="@{/ui/pedidos}">Pedidos — importar</a> com a planilha de operações do mesmo ano/mês.</p>
    <p class="text-muted small">Mês pode ser <code>1</code> ou <code>01</code>. Ano com quatro dígitos (ex.: 2024).</p>
    <form th:action="@{/ui/pedidos/gerar-xml}" method="post" class="card shadow-sm">
        <div class="card-body row g-3">
            <div class="col-md-2">
                <label class="form-label" for="ano">Ano</label>
                <input id="ano" class="form-control" name="ano" required maxlength="4"/>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="mes">Mês</label>
                <input id="mes" class="form-control" name="mes" required maxlength="2"/>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Baixar XML</button>
        </div>
    </form>
</main>
<th:block th:replace="~{fragments/scripts :: bootstrap}"></th:block>
</body>
</html>
