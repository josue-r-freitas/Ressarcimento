<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="h4 mb-3" th:text="${pageTitle}">Lista</h1>
    <form method="get" th:action="@{/ui/pedidos/lista}" class="row g-2 align-items-end card card-body shadow-sm mb-3">
        <div class="col-md-2">
            <label class="form-label" for="ano">Ano</label>
            <input id="ano" class="form-control" name="ano" th:value="${ano}"/>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="mes">Mês</label>
            <input id="mes" class="form-control" name="mes" th:value="${mes}"/>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Filtrar</button>
        </div>
    </form>
    <div class="table-responsive shadow-sm bg-white rounded border">
        <table class="table table-hover table-sm mb-0">
            <thead class="table-light">
            <tr>
                <th>Chave NF-e</th>
                <th>Ano</th>
                <th>Mês</th>
                <th>Qtd itens</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="n : ${page.content}">
                <td class="text-break" th:text="${n.chaveNFe}">-</td>
                <td th:text="${n.anoPeriodoReferencia}">-</td>
                <td th:text="${n.mesPeriodoReferencia}">-</td>
                <td th:text="${n.quantidadeItens}">-</td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav class="mt-3" th:if="${page.totalPages > 1}">
        <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${page.first} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/ui/pedidos/lista(page=${page.number - 1}, size=${page.size}, ano=${ano}, mes=${mes})}">Anterior</a>
            </li>
            <li class="page-item disabled"><span class="page-link"
                                                 th:text="'Página ' + ${page.number + 1} + ' de ' + ${page.totalPages}">1</span></li>
            <li class="page-item" th:classappend="${page.last} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/ui/pedidos/lista(page=${page.number + 1}, size=${page.size}, ano=${ano}, mes=${mes})}">Próxima</a>
            </li>
        </ul>
    </nav>
</main>
<th:block th:replace="~{fragments/scripts :: bootstrap}"></th:block>
</body>
</html>
