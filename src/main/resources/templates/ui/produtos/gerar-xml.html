<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="h4 mb-3" th:text="${pageTitle}">Gerar XML</h1>
    <p class="text-muted">Gera o arquivo <code>enviProdutoRessarcimento.xml</code> com base no declarante e na matriz de produtos cadastrada.</p>
    <form th:action="@{/ui/produtos/gerar-xml}" method="post" class="card shadow-sm">
        <div class="card-body">
            <p class="mb-0">Clique no botão para baixar o XML.</p>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Baixar XML</button>
        </div>
    </form>
</main>
<th:block th:replace="~{fragments/scripts :: bootstrap}"></th:block>
</body>
</html>
