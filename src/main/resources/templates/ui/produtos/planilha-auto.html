<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <h1 class="h4 mb-3" th:text="${pageTitle}">Planilha automática</h1>
    <p class="text-muted">Parâmetros opcionais (ano/mês de referência, nome do arquivo de resumo). Deixe em branco para usar os padrões do serviço.</p>
    <form th:action="@{/ui/produtos/gerar-planilha-automatica}" method="post" class="card shadow-sm">
        <div class="card-body row g-3">
            <div class="col-md-2">
                <label class="form-label" for="anoReferencia">Ano</label>
                <input id="anoReferencia" class="form-control" type="number" name="anoReferencia"/>
            </div>
            <div class="col-md-2">
                <label class="form-label" for="mesReferencia">Mês</label>
                <input id="mesReferencia" class="form-control" type="number" name="mesReferencia" min="1" max="12"/>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="nomeArquivoResumo">Nome arquivo resumo (.xlsx)</label>
                <input id="nomeArquivoResumo" class="form-control" name="nomeArquivoResumo" placeholder="ex.: resumonf.xlsx"/>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Baixar planilha_produtos.xlsx</button>
        </div>
    </form>
</main>
<th:block th:replace="~{fragments/scripts :: bootstrap}"></th:block>
</body>
</html>
